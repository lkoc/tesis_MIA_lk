# ============================================================
# Solver rápido para verificación (~2-3 min en CPU)
# Para resultados más precisos usar pinn_cables/configs/solver.yaml
# ============================================================

device: "auto"
seed: 42
dtype: "float32"

model:
  width: 64
  depth: 4
  activation: "tanh"
  fourier_features: false
  fourier_scale: 1.0
  fourier_mapping_size: 32

sampling:
  n_interior: 2000
  n_interface: 200
  n_boundary: 100
  oversample: 5
  resample_every: 0

normalization:
  normalize_coords: true

training:
  lr: 1.0e-3
  adam_steps: 2000
  lbfgs_steps: 200
  lbfgs_history: 50
  use_compile: false
  print_every: 200
  save_every: 0
  checkpoint_dir: "examples/xlpe_single_cable/results/checkpoints/"

loss_weights:
  pde: 1.0
  bc_dirichlet: 10.0
  bc_neumann: 1.0
  bc_robin: 10.0
  interface_T: 10.0
  interface_flux: 10.0
  ic: 10.0

time:
  n_time: 50

logging:
  log_dir: "examples/xlpe_single_cable/results/"
